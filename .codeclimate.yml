version: "2"

plugins:
  # Análisis Python — complejidad, mantenibilidad, code smells
  radon:
    enabled: true
    config:
      python_version: 3

  # Análisis JavaScript — complejidad, code smells
  eslint:
    enabled: true
    config:
      extensions:
        - .js

  # Detección de código duplicado en Python y JavaScript
  duplication:
    enabled: true
    config:
      languages:
        python:
          mass_threshold: 40
        javascript:
          mass_threshold: 40

  # Estilo Python PEP8
  pep8:
    enabled: true

checks:
  argument-count:
    config:
      threshold: 5
  complex-logic:
    config:
      threshold: 4
  file-lines:
    config:
      threshold: 300
  method-complexity:
    config:
      threshold: 10
  method-lines:
    config:
      threshold: 50
  nested-control-flow:
    config:
      threshold: 4
  return-statements:
    config:
      threshold: 4
  similar-code:
    config:
      threshold: 50
  identical-code:
    config:
      threshold: 50

exclude_patterns:
  - "**/__pycache__/**"
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/coverage/**"
  - "scripts/requirements.txt"
  - "package-lock.json"
  - "app/js/auth.js"
  - "app/js/medicos.js"
  - "app/js/pacientes.js"
