name: SIGC — CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Análisis de calidad con CodeClimate ─────────────────────────────
  code-quality:
    name: Análisis CodeClimate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install radon pytest pytest-cov

      - name: Calcular métricas de complejidad ciclomática (Radon)
        run: |
          echo "════════════════════════════════════════"
          echo "  COMPLEJIDAD CICLOMÁTICA — Radon CC"
          echo "════════════════════════════════════════"
          radon cc scripts/ -s -a
          echo ""
          echo "════════════════════════════════════════"
          echo "  ÍNDICE DE MANTENIBILIDAD — Radon MI"
          echo "════════════════════════════════════════"
          radon mi scripts/ -s
          echo ""
          echo "════════════════════════════════════════"
          echo "  MÉTRICAS HALSTEAD Y VOLUMEN — Radon HAL"
          echo "════════════════════════════════════════"
          radon hal scripts/

      - name: Verificar estilo PEP8
        run: |
          pip install pycodestyle
          echo "════════════════════════════════════════"
          echo "  ANÁLISIS DE ESTILO — PEP8"
          echo "════════════════════════════════════════"
          pycodestyle scripts/ --max-line-length=120 --statistics || true

      - name: Detectar código duplicado
        run: |
          pip install pylint
          echo "════════════════════════════════════════"
          echo "  DUPLICACIÓN DE CÓDIGO — Pylint"
          echo "════════════════════════════════════════"
          pylint scripts/*.py --disable=all --enable=duplicate-code \
            --min-similarity-lines=10 || true

  # ── JOB 2: Pruebas E2E con Selenium (headless) ────────────────────────────
  selenium-tests:
    name: Pruebas Selenium E2E
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          pip install pytest pytest-cov coverage

      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Verificar versión de Chrome
        run: google-chrome --version

      - name: Instalar Node.js y Live Server
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Iniciar Live Server en background
        run: |
          npm install -g live-server
          live-server app/ --port=5500 --no-browser &
          echo "Live Server iniciado en puerto 5500"
          sleep 3

      - name: Verificar que la app está corriendo
        run: curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5500/index.html

      - name: Configurar Selenium en modo headless
        run: |
          # Exportar variable para que los scripts usen modo headless
          echo "SELENIUM_HEADLESS=true" >> $GITHUB_ENV

      - name: Patch scripts para modo headless en CI
        run: |
          # Agregar --headless a las opciones de Chrome en todos los scripts
          python3 - << 'EOF'
          import os, re

          headless_snippet = '''        options.add_argument("--headless=new")
                  options.add_argument("--no-sandbox")
                  options.add_argument("--disable-dev-shm-usage")
                  options.add_argument("--disable-gpu")
          '''

          scripts_dir = "scripts"
          for fname in os.listdir(scripts_dir):
              if fname.startswith("test_") and fname.endswith(".py"):
                  fpath = os.path.join(scripts_dir, fname)
                  content = open(fpath).read()
                  # Insertar opciones headless antes de crear el driver
                  if "--headless" not in content:
                      content = content.replace(
                          'options.add_argument("--start-maximized")',
                          'options.add_argument("--start-maximized")\n' + headless_snippet
                      )
                      open(fpath, "w").write(content)
                      print(f"Patched: {fname}")
                  else:
                      print(f"Already headless: {fname}")
          EOF

      - name: Ejecutar suite completa de pruebas Selenium
        run: |
          cd scripts
          python run_all_tests.py
        continue-on-error: true

      - name: Publicar resultados
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "  RESUMEN DE EJECUCIÓN CI"
          echo "════════════════════════════════════════"
          echo "Repositorio : ${{ github.repository }}"
          echo "Rama        : ${{ github.ref_name }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Ejecutado   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
