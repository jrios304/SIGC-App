name: SIGC — CI Pipeline v2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Pruebas unitarias JS con Jest + cobertura ──────────────────────
  unit-tests-js:
    name: Pruebas Unitarias Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas unitarias con cobertura
        run: npm test

      - name: Instalar qlty CLI
        run: npm install -g @qltysh/qlty

      - name: Enviar reporte de cobertura a qlty.sh
        run: qlty coverage publish --token=${{ secrets.QLTY_COVERAGE_TOKEN }} coverage/lcov.info
        continue-on-error: true

  # ── JOB 2: Análisis de calidad con Radon ──────────────────────────────────
  code-quality:
    name: Análisis de Calidad Radon
    runs-on: ubuntu-latest
    needs: unit-tests-js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r scripts/requirements.txt
          pip install radon pycodestyle

      - name: Complejidad ciclomática — Radon CC
        run: |
          echo "==== COMPLEJIDAD CICLOMÁTICA ===="
          radon cc scripts/ -s -a

      - name: Índice de mantenibilidad — Radon MI
        run: |
          echo "==== ÍNDICE DE MANTENIBILIDAD ===="
          radon mi scripts/ -s

      - name: Estilo PEP8
        run: pycodestyle scripts/ --max-line-length=120 --statistics || true

  # ── JOB 3: Pruebas E2E con Selenium ───────────────────────────────────────
  selenium-e2e:
    name: Pruebas Selenium E2E
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install -r scripts/requirements.txt

      - name: Instalar Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Iniciar Live Server
        run: |
          npm install -g live-server
          live-server app/ --port=5500 --no-browser &
          sleep 3

      - name: Patch headless CI
        run: |
          python3 -c "
          import os
          h = '\n        options.add_argument(\"--headless=new\")\n        options.add_argument(\"--no-sandbox\")\n        options.add_argument(\"--disable-dev-shm-usage\")\n        options.add_argument(\"--disable-gpu\")\n'
          for f in os.listdir('scripts'):
              if f.startswith('test_') and f.endswith('.py'):
                  p = os.path.join('scripts', f)
                  c = open(p).read()
                  if '--headless' not in c:
                      c = c.replace('options.add_argument(\"--start-maximized\")', 'options.add_argument(\"--start-maximized\")' + h)
                      open(p, 'w').write(c)
          "

      - name: Ejecutar suite Selenium
        run: cd scripts && python run_all_tests.py
        continue-on-error: true

      - name: Resumen
        if: always()
        run: |
          echo "Repo: ${{ github.repository }} | Commit: ${{ github.sha }}"
          echo "Jobs: Jest (111) | Radon | Selenium (18)"
